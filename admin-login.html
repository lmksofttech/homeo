<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Kishore Homeo Clinic</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #111318;
    --bg-surface: #16181e;
    --emerald: #2dd4bf;
    --emerald-dark: #14b8a6;
    --emerald-glow: rgba(45,212,191,0.18);
    --gold: #f0b84a;
    --text: #e4e7ec;
    --text-muted: rgba(228,231,236,0.4);
    --white: #ffffff;
    --border: rgba(255,255,255,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Decorative Glows */
  body::before {
    content: '';
    position: absolute; top: -10%; left: -10%; width: 50vw; height: 50vw;
    background: radial-gradient(circle, rgba(45,212,191,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: absolute; bottom: -10%; right: -10%; width: 40vw; height: 40vw;
    background: radial-gradient(circle, rgba(240,184,74,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .login-card {
    width: 100%;
    max-width: 420px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    padding: 60px 48px;
    border-radius: 24px;
    position: relative;
    z-index: 10;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    animation: slideUp 0.6s ease-out both;
  }

  .brand {
    text-align: center;
    margin-bottom: 40px;
  }
  .brand-icon {
    width: 60px; height: 60px;
    background: rgba(45,212,191,0.1);
    border: 1px solid rgba(45,212,191,0.2);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    color: var(--emerald);
  }
  .brand-icon svg { width: 28px; height: 28px; fill: none; stroke: currentColor; stroke-width: 1.5; }
  
  .brand h2 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 500;
    color: var(--white);
    letter-spacing: -0.5px;
  }
  .brand h2 em { color: var(--gold); font-style: italic; }

  .form-group {
    margin-bottom: 24px;
  }
  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .form-group input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    padding: 16px 18px;
    border-radius: 14px;
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    font-size: 14.5px;
    outline: none;
    transition: all 0.25s;
  }
  .form-group input:focus {
    border-color: var(--emerald-dark);
    background: rgba(45,212,191,0.04);
    box-shadow: 0 0 0 4px rgba(45,212,191,0.1);
  }

  .btn-submit {
    width: 100%;
    background: var(--emerald);
    color: var(--bg-deep);
    border: none;
    padding: 18px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Outfit', sans-serif;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.25s;
    box-shadow: 0 10px 15px -3px rgba(45,212,191,0.3);
  }
  .btn-submit:hover {
    background: var(--white);
    transform: translateY(-2px);
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
  }
  .btn-submit:active { transform: translateY(0); }

  .error-msg {
    color: #f87171;
    font-size: 13px;
    margin-top: 20px;
    text-align: center;
    background: rgba(248,113,113,0.1);
    padding: 12px;
    border-radius: 10px;
    display: none;
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <h2>Admin<em>Portal</em></h2>
  </div>
  <form id="loginForm">
    <div class="form-group">
      <label>Access Key</label>
      <input type="text" id="username" placeholder="Username" required>
    </div>
    <div class="form-group">
      <label>Secret Code</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-submit">Sign In to Dashboard</button>
    <div class="error-msg" id="errorMsg">Invalid credentials.</div>
  </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn = e.target.querySelector('button');
      
      btn.innerText = 'Authenticating...';
      btn.disabled = true;
      
      try {
        const API_BASE = window.location.port === '3000' ? '' : 'https://homeo-ioft.onrender.com';
        const response = await fetch(`${API_BASE}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          sessionStorage.setItem('adminAuth', 'true');
          window.location.href = 'admin-dashboard.html';
        } else {
          btn.innerText = 'Sign In to Dashboard';
          btn.disabled = false;
          errorMsg.style.display = 'block';
          errorMsg.innerText = data.message || 'Access Denied';
        }
      } catch (err) {
        btn.innerText = 'Sign In to Dashboard';
        btn.disabled = false;
        errorMsg.style.display = 'block';
        errorMsg.innerText = 'Connection Error';
      }
    });
</script>
</body>
</html>
